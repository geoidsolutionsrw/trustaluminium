{% extends 'home/base.html' %} 
{% load static %} {% block title %}Edit Customer{%endblock %} {% block content %}
<div class="page-wrapper">
  <div class="content">
    <div class="page-header">
      <div class="page-title">
        <h4>Customer Edit</h4>
        <h6>Update Customer</h6>
      </div>
    </div>
    <form method="post">
      {% csrf_token %}
      <div class="card">
        <div class="card-body">
          <div class="row">
            <div class="col-lg-3 col-sm-6 col-12">
              <div class="form-group">
                <label for="cust_id">Customer ID</label>
                <input
                  type="text"
                  id="supplier_id"
                  class="form-control"
                  value="{{ form.instance.cust_id }}"
                  readonly
                />
              </div>
            </div>

            <div class="col-lg-3 col-sm-6 col-12">
              <div class="form-group">
                <label for="supplier_name">Customer Name</label>
                {{ form.customer_name }}
              </div>
            </div>
>
            <div class="col-lg-3 col-sm-6 col-12">
              <div class="form-group">
                <label for="email_address"> Email address</label>
                {{ form.email_address }}
              </div>
            </div>
            <div class="col-lg-3 col-sm-6 col-12">
              <div class="form-group">
                <label for="phone_number">Phone number</label>
                {{ form.phone_number }}
              </div>
            </div>
            <div class="col-lg-3 col-sm-6 col-12">
              <div class="form-group">
                <label for="tin">TIN Number</label>
                {{ form.tin }}
              </div>
            </div>
            <div class="col-lg-3 col-sm-6 col-12">
              <div class="form-group">
                <label for="address">Address</label>
                {{ form.address }}
              </div>
            </div>
            <div class="col-lg-3 col-sm-6 col-12">
               <div class="form-group">
                  <label for="customer_type">Customer Type</label>
                    <select class="select" name="{{ form.customer_type.name }}" id="{{ form.customer_type.id_for_label }}">
                   {% for value, label in form.customer_type.field.choices %}
                      <option value="{{ value }}" {% if form.customer_type.value == value %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                      </select>
               </div>
            </div>

            
            <div class="col-lg-12">
              <button type="submit" class="btn btn-submit me-2">Update</button>
              <a href="{% url 'customer' %}" class="btn btn-cancel">Cancel</a
              >
            </div>
          </div>
        </div>
      </div>
    </form>
    
  </div>
</div>
{% endblock %}
