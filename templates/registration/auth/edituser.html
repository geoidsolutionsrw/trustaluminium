{% extends 'home/base.html' %} {% load static %} {% block title %}Edit user{% endblock %} {% block content %}
<div class="page-wrapper">

<div class="container mt-4">
    <h2>Edit User: {{ user_obj.username }}</h2>
    
    <form method="post" class="mt-4">
        {% csrf_token %}
        
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" value="{{ user_obj.username }}" disabled>
        </div>
        
        <div class="mb-3">
            <label class="form-label">First Name</label>
            <input type="text" name="first_name" class="form-control" 
                   value="{{ user_obj.first_name }}">
        </div>
        
        <div class="mb-3">
            <label class="form-label">Last Name</label>
            <input type="text" name="last_name" class="form-control" 
                   value="{{ user_obj.last_name }}">
        </div>
        
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" 
                   value="{{ user_obj.email }}">
        </div>
        
        <div class="mb-3">
            <label class="form-label">New Password (leave blank to keep current)</label>
            <input type="password" name="new_password" class="form-control">
        </div>
        
        <div class="mb-3">
            <div class="form-check">
                <input type="checkbox" name="is_active" class="form-check-input" 
                       id="is_active" {% if user_obj.is_active %}checked{% endif %}>
                <label class="form-check-label" for="is_active">Active</label>
            </div>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Groups</label>
            {% for group in groups %}
            <div class="form-check">
                <input type="checkbox" name="groups" value="{{ group.id }}" 
                       class="form-check-input" id="group_{{ group.id }}"
                       {% if group in user_obj.groups.all %}checked{% endif %}>
                <label class="form-check-label" for="group_{{ group.id }}">
                    {{ group.name }}
                </label>
            </div>
            {% endfor %}
        </div>
        
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{% url 'user_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</div>
{% endblock %}
