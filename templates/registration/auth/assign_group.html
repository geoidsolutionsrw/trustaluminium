# templates/auth/assign_groups.html
{% extends "home/base.html" %}
{% block title %}Assihn User to Groups{% endblock %}
{% block content %}
<div class="container">
<div class="page-wrapper">
    <h2>Assign User to Groups</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="user">Select User:</label>
            <select name="user" class="form-control" required>
                {% for user in users %}
                <option value="{{ user.id }}">{{ user.username }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <h3>Select Groups</h3>
            {% for group in groups %}
            <div class="form-check">
                <input type="checkbox" name="groups" value="{{ group.id }}"
                       class="form-check-input" id="group_{{ group.id }}">
                <label class="form-check-label" for="group_{{ group.id }}">
                    {{ group.name }}
                </label>
            </div>
            {% endfor %}
        </div>
        
        <button type="submit" class="btn btn-primary">Assign Groups</button>
    </form>
</div></div>
{% endblock %}
