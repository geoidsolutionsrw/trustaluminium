{% extends 'home/base.html' %} {% load static %} {% block title %}Delete User{% endblock %} {% block content %}
<div class="page-wrapper">
<div class="container mt-4">
    <div class="card">
        <div class="card-body">
            <h3>Delete User</h3>
            <p>Are you sure you want to delete user "{{ user_obj.username }}"?</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Confirm Delete</button>
                <a href="{% url 'user_list' %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div></div>
</div>
{% endblock %}
