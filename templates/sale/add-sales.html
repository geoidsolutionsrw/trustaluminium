{% extends 'home/base.html' %} {% load static %}
{% block title %}Add Sale{% endblock %}

<script src="https://unpkg.com/htmx.org@1.9.4"></script>

{% block content %}
<div class="page-wrapper">
  <div class="content">
    <div class="page-header">
      <div class="page-title">
        <h4>Add Sale</h4>
        <h6>Add your new sale</h6>
      </div>
    </div>
    <form id="saleForm" method="post">
      {% csrf_token %}
      <div class="card">
        <div class="card-body">
          <!-- Customer and Date Selection -->
          <div class="row">
            <div class="col-lg-4 col-sm-6 col-12">
              <div class="form-group">
                <label>Customer</label>
                <div class="row">
               
                  <div class="col-lg-10 col-sm-10 col-10">
                    <select
                      class="select2"
                      name="customer"
                      id="customer"
                      required
                    >
                    <!--Customer Selection -->
                      <option value="">Choose Customer</option>
                      {% for customer in customers %}
                      <option value="{{ customer.cust_id }}">
                        {{ customer.customer_name }}
                      </option>
                      {% endfor %}
                    </select>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-lg-4 col-sm-6 col-12">
              <div class="form-group">
                <label>Date</label>
                <div class="input-groupicon">
                  <input
                    type="datetime-local"
                    name="sale_date"
                    id="sale_date"
                    class="form-control"
                    value="{% now 'Y-m-d\\TH:i' %}"
                  />
                  <a class="addonset">
                    <img
                      src="{% static 'img/icons/calendars.svg' %}"
                      alt="calendar"
                    />
                  </a>
                </div>
              </div>
            </div>
          </div>

          <!-- Product Addition Form -->
          <div class="row" id="product-form">
            <div class="col-lg-3 col-sm-6 col-12">
              <div class="form-group">
                <label>Product Name</label>
                <select class="form-control select2" id="product_select">
                  <option value="">Select Product</option>
                  {% for product in products %}
                  <option
                    value="{{ product.productid }}"
                    data-price="{{ product.price }}"
                    data-stock="{{ product.quantity }}"
                  >
                    {{ product.product_name }}
                  </option>
                  {% endfor %}
                </select>
              </div>
            </div>
            <div class="col-lg-2 col-sm-6 col-12">
              <div class="form-group">
                <label>Price</label>
                <input
                  type="number"
                  step="0.01"
                  id="price"
                  class="form-control"
                />
              </div>
            </div>
            <div class="col-lg-2 col-sm-6 col-12">
              <div class="form-group">
                <label>Quantity</label>
                <input
                  type="number"
                  id="quantity"
                  class="form-control"
                  min="1"
                />
                <small class="text-muted" id="stock-info"></small>
              </div>
            </div>
            <div class="col-lg-2 col-sm-6 col-12">
              <div class="form-group">
                <label>Tax (%)</label>
                <input
                  type="number"
                  step="0.01"
                  id="tax"
                  class="form-control"
                  value="0"
                />
              </div>
            </div>
            <div class="col-lg-2 col-sm-2 col-2 ps-0">
              <div class="form-group mt-4">
                <div class="page-btn">
                  <span
                    ><img
                      class="add-icon btn btn-added btn-primary"
                      src="{% static 'img/icons/plus.svg' %}"
                      alt="img"
                  /></span>
                </div>
              </div>
            </div>
            <!-- Products Table -->
            <div class="row">
              <div class="table-responsive mb-3">
                <table class="table" id="products-table">
                  <thead>
                    <tr>
                      <th>#</th>
                      <th>Product Name</th>
                      <th>QTY</th>
                      <th>Price</th>
                      <th>Tax</th>
                      <th>Subtotal</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody></tbody>
                </table>
              </div>
            </div>

            <!-- Status Selection -->
            <div class="row">
              <div class="col-lg-3 col-sm-6 col-12">
                <div class="form-group">
                <label for="payment_status">Payment Status</label>
                <select id="payment_status" name="payment_status" class="form-control" required>
                <option value="">Select Status</option>
                <option value="FULL">Full Payment</option>
                <option value="PARTIAL">Partial Payment</option>
                <option value="PENDING">Pending Payment</option>
               </select>
              </div>
                
              </div>

              <div class="col-lg-3 col-sm-6 col-12">
                  <div class="form-group">
                  <label for="payment_amount">Payment Amount</label>
                  <input 
                     type="number" 
                     id="payment_amount" 
                     name="payment_amount" 
                     class="form-control" 
                     step="0.01" min="0" 
                     required>
                  </div>

                
              </div>
              </div>
            </div>

            <!-- Totals Section -->
            <div class="row">
              <div class="col-lg-6">
                <div class="total-order w-100 max-widthauto m-auto mb-4">
                  <ul>
                    <li>
                      <h4>Tax</h4>
                      <h5><span id="total-tax">0.00</span> RWF</h5>
                    </li>
                  </ul>
                </div>
              </div>
              <div class="col-lg-6">
                <div class="total-order w-100 max-widthauto m-auto mb-4">
                  <ul>
                    <li class="total">
                      <h4>Grand Total</h4>
                      <h5>RWF <span id="grand-total">0.00</span></h5>
                    </li>
                  </ul>
                </div>
              </div>
            </div>

            <!-- Submit Buttons -->
            <div class="col-lg-12">
              <button
                type="submit"
                href="{% url 'saleslist' %}"
                class="btn btn-submit me-2"
              >
                Submit
              </button>
              <a href="{% url 'saleslist' %}" class="btn btn-cancel">Cancel</a>
            </div>
          </div>
        </div>
      
    </form>
 
  </div>
</div>
<script>
document.getElementById("saleForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    // Set the correct URL for your cPanel environment
    const url = '/addsales/';  // Relative to current path

    if (!productManager || productManager.getProducts().length === 0) {
        alert("Please add at least one product");
        return;
    }

    try {
        const formData = new FormData(this);
        formData.append("products", JSON.stringify(productManager.getProducts()));

        console.log("Submitting to:", url);  // Debug log

        const response = await fetch(url, {
            method: "POST",
            body: formData,
            headers: {
                "X-CSRFToken": document.querySelector("[name=csrfmiddlewaretoken]").value,
            },
        });

        if (!response.ok) {
            console.log("Response URL:", response.url);  // Debug log
            throw new Error(`Server returned status ${response.status}`);
        }

        const data = await response.json();
        if (data.success) {
            window.location.href = data.redirect_url;
        } else {
            alert(data.error || "Server returned an error");
        }
    } catch (error) {
        console.error("Submission Error:", error);
        alert(`Error: ${error.message}`);
    }
});
</script>
<!-- Include your custom scripts -->

<script src="{% static 'js/sales/payment_handlers.js' %}"></script>
<script src="{% static 'js/sales/select2_init.js' %}"></script>
<script src="{% static 'js/sales/date_handlers.js' %}"></script>
<script src="{% static 'js/sales/product_handlers.js' %}"></script>
{% endblock %}
