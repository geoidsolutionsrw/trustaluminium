<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sales List</title>
</head>
<body>
    <h1>Sales List</h1>
    
    <table border="1">
        <thead>
            <tr>
                <th>Customer ID</th>
                <th>Date</th>
                <th>Customer Name</th>
                <th>TIN</th>
                <th>Phone</th>
                <th>Total Amount</th>
            </tr>
        </thead>
        <tbody>
            {% for sale in sales_data %}
                <tr>
                    <td>{{ sale.customer_id }}</td>
                    <td>{{ sale.date }}</td>
                    <td>{{ sale.customer_name }}</td>
                    <td>{{ sale.tin }}</td>
                    <td>{{ sale.phone }}</td>
                    <td>{{ sale.total_amount }}</td>
                </tr>
            {% empty %}
                <tr>
                    <td colspan="6">No sales data available.</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
